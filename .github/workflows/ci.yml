name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Debug, Release]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install clang-tidy
        if: matrix.os == 'ubuntu-latest' && matrix.build_type == 'Debug'
        run: sudo apt-get install -y clang-tidy

      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DBIMEUP_BUILD_TESTS=ON
          ${{ matrix.os == 'ubuntu-latest' && matrix.build_type == 'Debug' && '-DCMAKE_CXX_CLANG_TIDY=clang-tidy' || '' }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} -j 2

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --build-config ${{ matrix.build_type }}
